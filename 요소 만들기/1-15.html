<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .text1 {
            position: absolute;
            top: 16px;
            left: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 24px;
            line-height: 100%;
        }

        .box1 {
            position: absolute;
            top: 64px; 
            left: 16px;
            width: 278px; 
            height: 64px;
        }

        .text2 {
            position: absolute;
            top: 0;
            left: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 16px;
        }

        .frame1 {
            position: absolute;
            top: 24px;
            width: 278px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #c3c3c3;
            box-sizing: border-box; 
        }

        .box2 {
            position: absolute;
            top: 152px; 
            left: 16px;
            width: 278px;
            height: 64px;
        }

        .text3 {
            position: absolute;
            top: 0;
            left: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 16px;
        }

        .frame2 {
            position: absolute;
            top: 24px;
            width: 278px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #c3c3c3;
            box-sizing: border-box;
        }

        .box3 {
            position: absolute;
            top: 240px; 
            left: 16px;
            width: 278px;
            height: 48px;
            border-radius: 8px;
            background-color: #17b75e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text4 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 20px;
            line-height: 100%;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="text1">로그인</div>

        <div class="box1">
            <div class="text2">아이디</div>
            <div class="frame1"></div>
        </div>

        <div class="box2">
            <div class="text3">비밀번호</div>
            <div class="frame2"></div>
        </div>

        <div class="box3">
            <div class="text4">로그인</div>
        </div>
    </div>
</body>

</html>
