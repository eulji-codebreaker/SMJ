<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .card {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 250px;
            display: flex;
            flex-direction: column;
        }

        .box {
            width: 250px;
            height: 150px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            background-color: #FFB9B9;
        }

        .bottom {
            width: 250px;
            background-color: #ffffff;
            box-sizing: border-box;
            border-right: 1px solid #FFB9B9;
            border-bottom: 1px solid #FFB9B9;
            border-left: 1px solid #FFB9B9;
            padding: 16px;
        }

        .text1 {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 400;
            line-height: 100%;
            margin-bottom: 12px;
            color: #000000;
        }

        .frame {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .circle {
            width: 24px;
            height: 24px;
            background-color: #d9d9d9;
            border-radius: 100%;
        }

        .text2 {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 400;
            line-height: 100%;
            color: #000000;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="box"></div>
            <div class="bottom">
                <div class="text1">안녕하세요. 텍스트입니다.</div>
                <div class="frame">
                    <div class="circle"></div>
                    <div class="text2">휴양조</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
