<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interior Design Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #ffffff; 
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .box {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 320px;
            height: 320px;
        }

        #a {
            width: 100%;
            height: 100%;
            background-image: url("image/ae952014cdd66cc9657b0dc753deb0628a21778a.jpg"); 
            background-position: center;
        }

        .circle1 {
            position: absolute;
            top: 16px;
            left: 272px;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background-color: #E3FF92;
        }

        .circle2 {
            position: absolute;
            top: 272px;
            left: 16px;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background-color: #92F8FF;
        }

        .circle3 {
            position: absolute;
            top: 272px;
            left: 272px;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background-color: #FF9292;
        }

        .text {
            position: absolute;
            top: 16px;
            left: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 24px;
            line-height: 100%;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <div id="a"></div>
            <div class="text">인테리어 디자인</div>
            <div class="circle1"></div>
            <div class="circle2"></div>
            <div class="circle3"></div>
        </div>
    </div>
</body>
</html>
