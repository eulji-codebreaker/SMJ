<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .box {
            position: absolute;
            width: 160px;
            height: 278px;
            top: 16px;
            left: 16px;
            border-radius: 16px;
            background-color: #CA785C;
        }

        .text {
            position: absolute;
            top: 302px;
            left: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            line-height: 100%;
            letter-spacing: -0.5%;
            color: #138A79;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="text">반갑습니다!</div>
    </div>
</body>

</html>
