<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .box {
            position: absolute;
            width: 297px;
            height: 35px;
            top: 16px;
            left: 16px;
            padding: 8px 16px;
            gap: 16px;

            background-color: #ffb9b9;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .text1, .text2, .text3 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            line-height: 100%;
            color: #ffffff;
            white-space: nowrap;
        }

        .circle1, .circle2 {
            width: 4px;
            height: 4px;
            background-color: #d9d9d9;
            border-radius: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <div class="text1">웹툰홈</div>
            <div class="circle1"></div>
            <div class="text2">요일별웹툰</div>
            <div class="circle2"></div>
            <div class="text3">베스트도전</div>
        </div>
    </div>
</body>

</html>
