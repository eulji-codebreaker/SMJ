<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
        }

        .card {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 120px;
        }

        .box {
            position: relative;
            width: 120px;
            height: 170px;
            background-color: #ffb9b9;
            border-radius: 8px;
        }

        .circle {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 24px;
            height: 24px;
            background-color: #d9d9d9;
            border-radius: 100%;
        }

        .text {
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 400;
            line-height: 100%;
            color: #000000;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="box">
                <div class="circle"></div>
            </div>
            <div class="text">나른한 점심시간, 밖에서 밥먹기</div>
        </div>
    </div>
</body>

</html>
