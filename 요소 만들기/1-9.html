<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .box {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 278px;
            height: 80px;
            background-color: #CA785C;
        }

        .text {
            position: absolute;
            top: 26px;
            left: 105px;
            font-family: 'Inter', sans-serif;
            line-height: 100%;
            font-weight: 700;
            font-size: 24px;
            color: #ffffff;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="box">
            <div class="text">한여름</div>
        </div>
    </div>
</body>

</html>
