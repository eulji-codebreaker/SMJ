<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .card {
            position: absolute;
            width: 300px;
            height: 250px;
            top: 16px;
            left: 16px;
            border-radius: 8px;
            overflow: hidden;
            background-image: url('image/80f96fff3c156d5cd401a6ab29061ecd75c5c704.jpg');
            background-size: cover;
            background-position: center;
        }

        .circle {
            position: absolute;
            width: 24px;
            height: 24px;
            top: 16px;
            left: 260px;
            background-color: #d9d9d9d9;
            border-radius: 100%;
        }

        .bottom {
            position: absolute;
            width: 100%;
            height: 70px;
            bottom: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.5); 
            padding: 12px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .text1 {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 100%;
            color: #ffffff;
        }

        .text2 {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 100%;
            color: #ffffffcc;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="circle"></div>
            <div class="bottom">
                <div class="text1">새로운 시작!</div>
                <div class="text2">김작가</div>
            </div>
        </div>
    </div>
</body>

</html>
