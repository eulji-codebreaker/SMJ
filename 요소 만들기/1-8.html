<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .box {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 160px;
            height: 240px;
            background-color: #CA785C;
            border-radius: 4px;
        }

        .image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 160px;
            height: 172px;
            overflow: hidden;
            border-radius: 4px 4px 0 0;
        }

        .image-container img {
            position: absolute;
            top: -471px;
            left: -221px;
        }

        .text1 {
            position: absolute;
            top: 180px;
            left: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            line-height: 100%;
            letter-spacing: -0.5%;
            color: #ffffff;
        }

        .text2 {
            position: absolute;
            top: 215px;
            left: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            line-height: 100%;
            letter-spacing: -0.5%;
            color: #ffffff;
        }

        .text3 {
            position: absolute;
            top: 215px;
            left: 76px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            line-height: 100%;
            letter-spacing: -0.5%;
            color: #ffffff;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="box">
            <div class="image-container">
                <img src="image/a16fabed86eeb187c1e5f8823914fafb06da4634.jpg" alt="이미지">
            </div>

            <div class="text1">인테리어란?</div>
            <div class="text2">김작가</div>
            <div class="text3">2024.01.01</div>
        </div>
    </div>
</body>

</html>
