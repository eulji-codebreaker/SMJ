<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .box {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 160px;
            height: 278px;
            background-color: #FFB9B9;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
