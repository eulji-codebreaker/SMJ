<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .card {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 400px;
            padding: 32px 24px;
            background-color: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .title-text {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: #000000;
            margin-bottom: 20px;
            text-align: center;
        }

        .button-frame {
            width: 100%;
            height: 56px;
            background-color: #6eb36d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .login-text {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .group-frame {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-text {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #d3d5d7;
            text-decoration: none;
        }

        .line {
            width: 1px;
            height: 12px;
            background-color: #d9d9d9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="title-text">사이트를 더 안전하고 편리하게 이용하세요.</div>
            
            <div class="button-frame">
                <div class="login-text">로그인</div>
            </div>

            <div class="group-frame">
                <div class="link-text">아이디 찾기</div>
                <div class="line"></div>
                <div class="link-text">비밀번호 찾기</div>
                <div class="line"></div>
                <div class="link-text">회원가입</div>
            </div>
        </div>
    </div>
</body>

</html>
