<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
        }

        .profile-card {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 160px;
            height: 195px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .circle {
            width: 160px;
            height: 160px;
            background-color: #CA785C;
            border-radius: 9999px;
        }

        .text {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            text-align: center;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="profile-card">
            <div class="circle"></div>
            <div class="text">프로필</div>
        </div>
    </div>
</body>

</html>
